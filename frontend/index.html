<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Lookup | AWS Three-Tier App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="8" fill="#FF9900"/>
          <path d="M20 8L32 14V26L20 32L8 26V14L20 8Z" stroke="white" stroke-width="2" fill="none"/>
          <circle cx="20" cy="20" r="4" fill="white"/>
        </svg>
      </div>

      <h1>User Lookup</h1>
      <p class="subtitle">Three-Tier Serverless App &mdash; S3 · CloudFront · API Gateway · Lambda · DynamoDB</p>

      <div class="input-group">
        <label for="userId">User ID</label>
        <input
          id="userId"
          type="text"
          placeholder="e.g. 1"
          autocomplete="off"
        />
      </div>

      <button id="fetchBtn" onclick="fetchUser()">Get User Data</button>

      <div id="result" class="result hidden"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
